<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Резюме — редактор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --paper:#FCFAF7; --ink:#211C18; --ink2:#4A4039; --muted:#8C8076;
  --line:#E7DED5; --accent:#BF5A36; --accent-deep:#934026;
  --accent-line:rgba(191,90,54,.32); --accent-tint:rgba(191,90,54,.12);

  --ed-bg:#161412; --ed-surf:#201E1B; --ed-surf2:#2A2724;
  --ed-border:#302D29; --ed-text:#E8E0D8; --ed-muted:#706860;
  --ed-accent:#BF5A36; --ed-input:#242220;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'IBM Plex Sans', sans-serif; }

/* ─── APP SHELL ─────────────────────────────────────────── */
.app { display: flex; height: 100vh; background: #0D0B0A; overflow: hidden; }

/* ─── EDITOR SIDEBAR ────────────────────────────────────── */
.editor {
  width: 400px; min-width: 400px;
  display: flex; flex-direction: column;
  background: var(--ed-bg);
  border-right: 1px solid var(--ed-border);
  overflow: hidden;
}

.ed-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--ed-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

.ed-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ed-accent);
}
.ed-logo span { color: var(--ed-muted); }

.btn-pdf {
  background: var(--ed-accent); color: #fff;
  border: none; border-radius: 5px;
  padding: 8px 16px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background .15s;
  display: flex; align-items: center; gap: 7px;
  letter-spacing: .01em;
}
.btn-pdf:hover { background: var(--accent-deep); }
.btn-pdf svg { flex-shrink: 0; }

/* ─── FORMAT TOOLBAR ────────────────────────────────────── */
.ed-fmt {
  display: flex; align-items: center; gap: 5px;
  padding: 9px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--ed-border);
  background: var(--ed-surf);
}
.fmt-btn {
  width: 30px; height: 28px;
  background: var(--ed-input); border: 1px solid var(--ed-border);
  border-radius: 4px; color: var(--ed-text);
  font-size: 13px; cursor: pointer; transition: .12s;
  display: flex; align-items: center; justify-content: center;
}
.fmt-btn:hover { border-color: var(--ed-accent); color: var(--ed-accent); }
.fmt-btn .hl { background: var(--accent-tint); color: var(--accent); padding: 0 4px; border-radius: 2px; }
.fmt-sep { width: 1px; height: 18px; background: var(--ed-border); margin: 0 4px; }
.fmt-hint { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: var(--ed-muted); margin-left: auto; }

/* ─── CONTROLS ROW ──────────────────────────────────────── */
.ed-controls {
  padding: 11px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--ed-border);
  display: flex; flex-direction: column; gap: 10px;
}
.ctl-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.ctl-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
  letter-spacing: .06em; text-transform: uppercase; color: var(--ed-muted);
  margin-right: 2px;
}
.swatch {
  width: 19px; height: 19px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: .12s; padding: 0;
}
.swatch.active { border-color: var(--ed-text); }
.swatch:hover { transform: scale(1.12); }
input[type=color] {
  width: 26px; height: 22px; padding: 0; border: 1px solid var(--ed-border);
  border-radius: 4px; background: var(--ed-input); cursor: pointer;
}
.toggle {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  font-size: 12px; color: var(--ed-text); user-select: none;
}
.toggle input { display: none; }
.toggle .track {
  width: 32px; height: 18px; border-radius: 9px; background: var(--ed-surf2);
  border: 1px solid var(--ed-border); position: relative; transition: .15s;
}
.toggle .track::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%; background: var(--ed-muted); transition: .15s;
}
.toggle input:checked + .track { background: var(--ed-accent); border-color: var(--ed-accent); }
.toggle input:checked + .track::after { transform: translateX(14px); background: #fff; }

.page-badge {
  margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  padding: 3px 9px; border-radius: 4px; letter-spacing: .03em;
  border: 1px solid var(--ed-border); display: flex; align-items: center; gap: 6px;
}
.page-badge.ok { color: #7FB069; border-color: rgba(127,176,105,.4); }
.page-badge.warn { color: #E0A03A; border-color: rgba(224,160,58,.45); background: rgba(224,160,58,.07); }
.page-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.btn-mini {
  background: var(--ed-input); border: 1px solid var(--ed-border);
  border-radius: 4px; color: var(--ed-text);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 11.5px;
  padding: 6px 11px; cursor: pointer; transition: .12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-mini:hover { border-color: var(--ed-accent); color: var(--ed-accent); }
.btn-mini.danger:hover { border-color: #C0533E; color: #E07A63; }
.save-status { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: var(--ed-muted); margin-left: auto; }

.ed-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.ed-scroll::-webkit-scrollbar { width: 5px; }
.ed-scroll::-webkit-scrollbar-thumb { background: var(--ed-border); border-radius: 3px; }

/* ─── ACCORDION SECTIONS ────────────────────────────────── */
.acc { margin-bottom: 4px; border: 1px solid var(--ed-border); border-radius: 7px; overflow: hidden; }
.acc-head {
  padding: 10px 14px; background: var(--ed-surf);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.acc-head:hover { background: var(--ed-surf2); }
.acc-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  font-weight: 600; color: var(--ed-text);
  display: flex; align-items: center; gap: 8px;
}
.acc-label .n { color: var(--ed-accent); font-weight: 400; }
.acc-arrow { color: var(--ed-muted); font-size: 9px; transition: transform .2s; }
.acc.open .acc-arrow { transform: rotate(180deg); }
.acc-body { display: none; padding: 14px; background: #1A1815; border-top: 1px solid var(--ed-border); }
.acc.open .acc-body { display: block; }

/* ─── FORM CONTROLS ─────────────────────────────────────── */
.field { margin-bottom: 11px; }
.field:last-child { margin-bottom: 0; }
.field.row { display: flex; gap: 10px; align-items: flex-end; }
.field.row > * { flex: 1; }
.field.row .grow0 { flex: 0 0 84px; }

label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
  color: var(--ed-muted); margin-bottom: 5px;
}

input[type=text], textarea {
  width: 100%; background: var(--ed-input);
  border: 1px solid var(--ed-border); border-radius: 4px;
  color: var(--ed-text);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 13px;
  padding: 7px 10px; outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
input[type=text]:focus, textarea:focus { border-color: var(--ed-accent); }
textarea { resize: vertical; min-height: 72px; line-height: 1.55; }
[data-rich="1"]:focus { box-shadow: 0 0 0 3px var(--accent-tint); }

.hint { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ed-muted); margin: 0 0 10px; line-height: 1.5; }
.hint b { color: var(--ed-text); }
.hint code { background: var(--ed-input); padding: 1px 4px; border-radius: 3px; color: var(--ed-accent); }

/* ─── ENTRY CARDS ───────────────────────────────────────── */
.entry {
  background: var(--ed-input); border: 1px solid var(--ed-border);
  border-radius: 5px; padding: 12px; margin-bottom: 10px;
}
.entry:last-of-type { margin-bottom: 10px; }
.entry-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.entry-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px; color: var(--ed-accent); letter-spacing: .04em;
}
.entry-ctrls { display: flex; gap: 4px; }
.ic {
  width: 22px; height: 22px; border-radius: 4px;
  background: var(--ed-surf2); border: 1px solid var(--ed-border);
  color: var(--ed-muted); cursor: pointer; font-size: 11px; line-height: 1;
  display: flex; align-items: center; justify-content: center; transition: .12s;
}
.ic:hover:not(:disabled) { border-color: var(--ed-accent); color: var(--ed-accent); }
.ic.danger:hover:not(:disabled) { border-color: #C0533E; color: #E07A63; }
.ic:disabled { opacity: .3; cursor: not-allowed; }

.btn-add {
  width: 100%; background: transparent; border: 1px dashed var(--ed-border);
  border-radius: 5px; color: var(--ed-muted);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 12px;
  padding: 9px; cursor: pointer; transition: .12s; margin-top: 2px;
}
.btn-add:hover { border-color: var(--ed-accent); color: var(--ed-accent); }

/* ─── PHOTO UPLOAD ──────────────────────────────────────── */
.photo-upload { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
.photo-thumb {
  width: 56px; height: 56px; border-radius: 3px;
  background: var(--ed-surf2); border: 1px solid var(--ed-border);
  object-fit: cover; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb-placeholder { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--ed-muted); text-align: center; line-height: 1.4; }
.btn-photo {
  background: transparent; border: 1px dashed var(--ed-border); border-radius: 4px;
  color: var(--ed-muted); font-family: 'IBM Plex Sans', sans-serif; font-size: 12px;
  padding: 7px 13px; cursor: pointer; transition: .15s; white-space: nowrap;
}
.btn-photo:hover { border-color: var(--ed-accent); color: var(--ed-accent); }
.btn-photo.clear { border-style: solid; padding: 6px 10px; margin-top: 6px; }
input[type=file] { display: none; }

/* ─── PREVIEW PANE ──────────────────────────────────────── */
.preview {
  flex: 1; overflow-y: auto; background: #222018;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 48px 40px;
}
.preview::-webkit-scrollbar { width: 8px; }
.preview::-webkit-scrollbar-track { background: #1A1816; }
.preview::-webkit-scrollbar-thumb { background: #38342F; border-radius: 4px; }

/* ─── RESUME STYLES ─────────────────────────────────────── */
.rc-page {
  width: 794px; min-height: 1123px;
  background: var(--paper); color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif;
  padding: 44px 56px 48px;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
  border-top: 4px solid var(--accent);
  box-shadow: 0 12px 60px rgba(0,0,0,.5);
  flex-shrink: 0;
}
.rc-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 26px; }
.rc-headl { min-width: 0; }
.rc-tagline { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--accent); letter-spacing: .02em; margin-bottom: 9px; }
.rc-tagline .br { color: var(--muted); }
.rc-name { font-size: 40px; font-weight: 600; line-height: 1.02; letter-spacing: -.02em; margin: 0; color: var(--ink); }
.rc-sub { font-size: 13px; color: var(--ink2); margin-top: 7px; font-weight: 500; }
.rc-photo { width: 100px; height: 100px; flex: 0 0 auto; border: 1px solid var(--line); object-fit: cover; }
.rc-photo-ph { width: 100px; height: 100px; flex: 0 0 auto; border: 1px solid var(--line); background: var(--accent-tint); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); }
.rc-meta { display: flex; flex-wrap: wrap; gap: 4px 22px; margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink2); }
.rc-meta .mk { color: var(--muted); }
.rc-meta a { color: var(--ink2); text-decoration: none; border-bottom: 1px solid transparent; }
.rc-meta a:hover { border-bottom-color: var(--accent-line); }
.rc-divider { height: 1px; background: var(--line); margin: 18px 0; }
.rc-cols { display: grid; grid-template-columns: 1fr 246px; gap: 38px; flex: 1; }
.rc-col-empty { display: none; }
.rc-sechead { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); font-weight: 600; margin: 0 0 13px; display: flex; align-items: center; gap: 8px; }
.rc-sechead .idx { color: var(--accent); }
.rc-block { margin-bottom: 16px; }
.rc-block:last-child { margin-bottom: 0; }
.rc-exp { margin-bottom: 10px; }
.rc-exp:last-child { margin-bottom: 0; }
.rc-exp-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.rc-org { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.rc-unit { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.3; margin-top: 1px; }
.rc-period { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); white-space: nowrap; }
.rc-title { font-size: 12px; color: var(--accent-deep); font-weight: 500; margin: 1px 0 7px; }
.rc-bullets { list-style: none; }
.rc-bullets li { font-size: 12px; line-height: 1.45; color: var(--ink2); padding-left: 18px; position: relative; margin-bottom: 4px; }
.rc-bullets li::before { content: '→'; position: absolute; left: 0; top: 0; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.rc-bullets b { color: var(--ink); font-weight: 700; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; }
.rc-proj { margin-bottom: 11px; }
.rc-proj-top { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.rc-proj-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.rc-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: .02em; color: var(--accent); border: 1px solid var(--accent-line); border-radius: 2px; padding: 1.5px 6px; }
.rc-stack { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin: 3px 0 4px; line-height: 1.45; }
.rc-desc { font-size: 11.5px; line-height: 1.45; color: var(--ink2); margin: 0; }
.rc-desc b { color: var(--ink); font-weight: 600; }
.rc-links { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
.rc-techgrp { margin-bottom: 13px; }
.rc-tgh { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .04em; color: var(--accent-deep); margin-bottom: 6px; text-transform: lowercase; }
.rc-tgh::before { content: '# '; color: var(--accent); }
.rc-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.rc-chip { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--ink2); border: 1px solid var(--line); border-radius: 3px; padding: 2px 7px; line-height: 1.3; background: #fff; white-space: nowrap; }
.rc-edu { margin-bottom: 11px; }
.rc-edu:last-child { margin-bottom: 0; }
.rc-edu-h { font-size: 12px; font-weight: 600; color: var(--ink); }
.rc-edu-p { font-size: 11px; color: var(--ink2); line-height: 1.4; margin: 1px 0; }
.rc-edu-d { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
.rc-lang { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--line); }
.rc-lang:last-child { border-bottom: 0; }
.rc-lang .l { color: var(--ink); font-weight: 500; }
.rc-lang .v { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

/* ── inline rich formatting in resume ── */
.rc-page mark { background: var(--accent-tint); color: var(--accent-deep); padding: 0 3px; border-radius: 2px; font-weight: 500; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
.rc-page i { font-style: italic; }
.rc-desc a, .rc-bullets a, .rc-links a, .rc-edu-p a { color: var(--accent-deep); text-decoration: none; border-bottom: 1px solid var(--accent-line); font-weight: 500; }
.rc-desc a:hover, .rc-bullets a:hover, .rc-links a:hover { border-bottom-color: var(--accent-deep); }

/* ─── COMPACT DENSITY ───────────────────────────────────── */
.rc-page.compact { padding: 30px 46px 34px; }
.rc-page.compact .rc-name { font-size: 33px; }
.rc-page.compact .rc-meta { margin-top: 10px; }
.rc-page.compact .rc-divider { margin: 12px 0; }
.rc-page.compact .rc-cols { gap: 28px; }
.rc-page.compact .rc-block { margin-bottom: 11px; }
.rc-page.compact .rc-sechead { margin-bottom: 9px; }
.rc-page.compact .rc-exp { margin-bottom: 8px; }
.rc-page.compact .rc-bullets li { font-size: 11px; line-height: 1.38; margin-bottom: 3px; }
.rc-page.compact .rc-desc { font-size: 11px; line-height: 1.4; }
.rc-page.compact .rc-proj { margin-bottom: 8px; }
.rc-page.compact .rc-techgrp { margin-bottom: 10px; }
.rc-page.compact .rc-lang { padding: 4px 0; }

/* ─── PRINT ─────────────────────────────────────────────── */
@media print {
  @page { size: A4; margin: 0; }
  html, body {
    background: #fff; height: auto; margin: 0; padding: 0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .app { display: block; height: auto; overflow: visible; }
  .editor { display: none !important; }
  .preview { display: block; background: #fff; padding: 0; margin: 0; overflow: visible; }
  .rc-page {
    box-shadow: none !important; width: 210mm;
    min-height: auto; height: auto; margin: 0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .rc-page * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ═══════════════ EDITOR SIDEBAR ═══════════════ -->
  <aside class="editor">
    <div class="ed-header">
      <div class="ed-logo"><span>// </span>resume.editor</div>
      <button class="btn-pdf" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 1v8M3 6.5l3.5 3.5 3.5-3.5M1 10.5h11" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Скачать PDF
      </button>
    </div>

    <!-- format toolbar -->
    <div class="ed-fmt">
      <button class="fmt-btn" data-fmt="bold" title="Жирный  (**текст**)"><b>B</b></button>
      <button class="fmt-btn" data-fmt="hl" title="Выделить  (==текст==)"><span class="hl">H</span></button>
      <button class="fmt-btn" data-fmt="italic" title="Курсив  (*текст*)"><i>i</i></button>
      <button class="fmt-btn" data-fmt="link" title="Ссылка  [текст](url)">🔗</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" data-fmt="br" title="Перенос строки">↵</button>
      <span class="fmt-hint" id="fmtHint">фокус в поле описания</span>
    </div>

    <!-- controls -->
    <div class="ed-controls">
      <div class="ctl-row">
        <span class="ctl-label">Акцент</span>
        <button class="swatch" style="background:#BF5A36" data-accent="#BF5A36"></button>
        <button class="swatch" style="background:#2F6F62" data-accent="#2F6F62"></button>
        <button class="swatch" style="background:#3A5A8C" data-accent="#3A5A8C"></button>
        <button class="swatch" style="background:#7A4FB5" data-accent="#7A4FB5"></button>
        <button class="swatch" style="background:#A8324A" data-accent="#A8324A"></button>
        <button class="swatch" style="background:#3E3A36" data-accent="#3E3A36"></button>
        <input type="color" id="accentPick" value="#BF5A36" title="Свой цвет">
        <label class="toggle" style="margin-left:auto">
          <input type="checkbox" id="compactToggle">
          <span class="track"></span>
          <span>Компактно</span>
        </label>
      </div>
      <div class="ctl-row">
        <button class="btn-mini" id="btnExport" title="Сохранить данные в файл .json">↓ Экспорт</button>
        <button class="btn-mini" id="btnImport" title="Загрузить данные из файла .json">↑ Импорт</button>
        <input type="file" id="importFile" accept="application/json,.json">
        <button class="btn-mini" id="btnPublish" title="Опубликовать резюме на GitHub — обновится для всех">⤴ Опубликовать</button>
        <button class="btn-mini danger" id="btnReset" title="Сбросить к исходному резюме">⟲ Сброс</button>
        <span class="page-badge ok" id="pageBadge"><span class="dot"></span>1 страница</span>
      </div>

   DEFAULT DATA  — исходное резюме

/* ════════════════════════════════════════════════════════════
   STORAGE
   ════════════════════════════════════════════════════════════ */
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function load(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return Object.assign(deepClone(DEFAULTS), JSON.parse(raw));
  } catch(e){}
  return deepClone(DEFAULTS);

let saveTimer = null;
function persist(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){}

/* ════════════════════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════════════════════ */
function esc(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setByPath(obj, path, value){
  const p = path.split('.'); let o = obj;
  for (let i=0;i<p.length-1;i++) o = o[p[i]];
  o[p[p.length-1]] = value;
}

/* esc() и setByPath() — выше. inlineRich / linkifyList / buildHref
   вынесены в общий модуль resume-render.js (общие для резюме и редактора). */

/* ════════════════════════════════════════════════════════════

function field(label, bind, value, opts={}){

  const rich = opts.rich ? 'data-rich="1"' : '';
  const cls  = opts.cls  ? `class="${opts.cls}"` : '';
  if (opts.area)
    return `<div class="field" ${cls}><label>${label}</label><textarea data-bind="${bind}" ${rich} ${ph} style="${opts.style||''}">${esc(value)}</textarea></div>`;
  return `<div class="field" ${cls}><label>${label}</label><input type="text" data-bind="${bind}" ${rich} ${ph} value="${esc(value)}"></div>`;
}
function entryCtrls(list, idx, len){
  return `<div class="entry-ctrls">
    <button class="ic" data-act="move" data-list="${list}" data-idx="${idx}" data-dir="-1" ${idx===0?'disabled':''} title="Выше">↑</button>
    <button class="ic" data-act="move" data-list="${list}" data-idx="${idx}" data-dir="1" ${idx===len-1?'disabled':''} title="Ниже">↓</button>
    <button class="ic danger" data-act="remove" data-list="${list}" data-idx="${idx}" title="Удалить">✕</button>
  </div>`;
}
function addBtn(list, label){ return `<button class="btn-add" data-act="add" data-list="${list}">+ ${label}</button>`; }
function acc(id, num, title, body){

}

/* ── индикатор: помещается ли резюме на одну A4-страницу ── */
function updatePageBadge(){
  const badge = document.getElementById('pageBadge');
  const h = document.getElementById('resume').scrollHeight;
  const pages = Math.max(1, Math.ceil((h - 4) / 1123));
  if (pages <= 1){
    badge.className = 'page-badge ok';
    badge.innerHTML = '<span class="dot"></span>1 страница';
  } else {
    badge.className = 'page-badge warn';
    badge.innerHTML = `<span class="dot"></span>${pages} стр. — включите «Компактно» или сократите текст`;
  }
}

/* ════════════════════════════════════════════════════════════
   ACCENT COLOR
   ════════════════════════════════════════════════════════════ */
function hexToRgb(h){
  h = h.replace('#',''); if (h.length===3) h = h.split('').map(x=>x+x).join('');
  return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) };
}
function clamp(v){ return Math.max(0, Math.min(255, Math.round(v))); }
function rgbToHex(r,g,b){ return '#' + [r,g,b].map(v=>clamp(v).toString(16).padStart(2,'0')).join(''); }
function applyAccent(hex){
  const {r,g,b} = hexToRgb(hex);
  const root = document.documentElement.style;
  root.setProperty('--accent', hex);
  root.setProperty('--accent-deep', rgbToHex(r*0.78, g*0.78, b*0.78));
  root.setProperty('--accent-line', `rgba(${r},${g},${b},.32)`);
  root.setProperty('--accent-tint', `rgba(${r},${g},${b},.12)`);
  document.querySelectorAll('.swatch').forEach(sw =>
    sw.classList.toggle('active', sw.dataset.accent.toLowerCase() === hex.toLowerCase()));
  const pick = document.getElementById('accentPick'); if (pick) pick.value = hex;
}

/* ════════════════════════════════════════════════════════════
   FORMAT TOOLBAR
   ════════════════════════════════════════════════════════════ */
function applyFormat(kind){
  const el = activeField;
  if (!el){ flashHint('сначала кликните в поле описания'); return; }
  const start = el.selectionStart, end = el.selectionEnd, v = el.value;
  const sel = v.slice(start, end);
  const wrap = (pre, suf, ph) => {
    const inner = sel || ph;
    el.value = v.slice(0,start) + pre + inner + suf + v.slice(end);
    const caret = start + pre.length + inner.length + suf.length;
    el.setSelectionRange(start + pre.length, start + pre.length + inner.length);
    return caret;
  };
  if (kind==='bold')   wrap('**','**','текст');
  if (kind==='hl')     wrap('==','==','текст');
  if (kind==='italic') wrap('*','*','текст');
  if (kind==='link')   { const u = sel || 'текст'; el.value = v.slice(0,start)+`[${u}](https://)`+v.slice(end); el.setSelectionRange(start+u.length+3, start+u.length+11); }
  if (kind==='br')     { el.value = v.slice(0,start)+'\n'+v.slice(end); el.setSelectionRange(start+1, start+1); }
  el.focus();
  el.dispatchEvent(new Event('input', { bubbles:true }));
}
let hintTimer = null;
function flashHint(msg){
  const h = document.getElementById('fmtHint'); if (!h) return;
  const prev = h.textContent; h.textContent = msg; h.style.color = 'var(--ed-accent)';
  clearTimeout(hintTimer); hintTimer = setTimeout(()=>{ h.textContent = prev; h.style.color=''; }, 1600);
}

/* ════════════════════════════════════════════════════════════
   EXPORT / IMPORT / RESET
   ════════════════════════════════════════════════════════════ */
function exportJSON(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `resume-${(state.profile.name||'data').trim().replace(/\s+/g,'-')}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}
/* ════════════════════════════════════════════════════════════
   PUBLISH TO GITHUB — обновляет resume-data.js в репозитории
   через GitHub Contents API. После этого GitHub Pages пересобирается
   и все посетители видят новую версию (~30 сек).
   ════════════════════════════════════════════════════════════ */
const GH_OWNER = 'XDobriev';
const GH_REPO  = 'cv-editor';
const GH_FILE  = 'resume-data.js';
const GH_TOKEN_KEY = 'gh-publish-token';

function buildResumeDataJS(){
  const indent = s => s.replace(/\n/g, '\n  ');
  const resumeJson = indent(JSON.stringify(state, null, 2));
  const portfolioJson = indent(JSON.stringify(window.PORTFOLIO || {}, null, 2));
  return `/* ════════════════════════════════════════════════════════════
   ЕДИНЫЙ ИСТОЧНИК ДАННЫХ
   ════════════════════════════════════════════════════════════ */
(function (root) {

  const RESUME_DATA = ${resumeJson};

  const PORTFOLIO = ${portfolioJson};

  root.RESUME_DATA = RESUME_DATA;
  root.PORTFOLIO = PORTFOLIO;
  if (typeof module !== 'undefined' && module.exports) module.exports = { RESUME_DATA, PORTFOLIO };

})(typeof window !== 'undefined' ? window : globalThis);
`;
}

function getGHToken(){
  let token = localStorage.getItem(GH_TOKEN_KEY);
  if (token) return token;
  token = prompt(
    'Для публикации нужен GitHub Personal Access Token.\n\n' +
    '1. Открой github.com → Settings → Developer settings → Fine-grained tokens\n' +
    '2. Создай токен с доступом к репо «' + GH_REPO + '» (Contents: Read and write)\n' +
    '3. Вставь токен сюда:\n\n' +
    'Токен сохранится в браузере. Удалить: localStorage.removeItem("' + GH_TOKEN_KEY + '")'
  );
  if (!token) return null;
  localStorage.setItem(GH_TOKEN_KEY, token.trim());
  return token.trim();
}

async function publishToGitHub(){
  const token = getGHToken();
  if (!token) return;

  const btn = document.getElementById('btnPublish');
  const orig = btn.textContent;
  btn.textContent = '⏳ Публикация…';
  btn.disabled = true;

  try {
    const apiBase = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;
    const headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' };

    const meta = await fetch(apiBase, { headers }).then(r => {
      if (r.status === 401) throw new Error('Токен недействителен. Удали старый: localStorage.removeItem("' + GH_TOKEN_KEY + '")');
      if (r.status === 404) throw new Error('Файл ' + GH_FILE + ' не найден в репозитории');
      if (!r.ok) throw new Error('GitHub API: ' + r.status);
      return r.json();
    });

    const content = buildResumeDataJS();
    const encoded = btoa(unescape(encodeURIComponent(content)));

    const put = await fetch(apiBase, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'update: резюме обновлено из редактора',
        content: encoded,
        sha: meta.sha,
      }),
    });
    if (!put.ok) {
      const err = await put.json().catch(() => ({}));
      throw new Error(err.message || 'Ошибка записи: ' + put.status);
    }

    btn.textContent = '✓ Опубликовано!';
    btn.style.borderColor = '#7FB069'; btn.style.color = '#7FB069';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; btn.disabled = false; }, 3000);
  } catch (e) {
    alert('Ошибка публикации:\n' + e.message);
    btn.textContent = orig; btn.disabled = false;
    if (/Токен недействителен/.test(e.message)) localStorage.removeItem(GH_TOKEN_KEY);
  }
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      state = Object.assign(deepClone(DEFAULTS), data);
      afterStateReplace();
    } catch(err){ alert('Не удалось прочитать файл: ' + err.message); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if (!confirm('Сбросить все изменения и вернуть исходное резюме?')) return;
  state = deepClone(DEFAULTS);
  afterStateReplace();
}
function afterStateReplace(){
  applyAccent(state.settings.accent || '#BF5A36');
  document.getElementById('compactToggle').checked = !!state.settings.compact;
  renderForm(); renderPreview(); persist();
}

/* ════════════════════════════════════════════════════════════
   EVENT WIRING
   ════════════════════════════════════════════════════════════ */
const scroll = document.getElementById('edScroll');

// текстовый ввод в форме
scroll.addEventListener('input', e=>{
  const t = e.target;
  if (t.dataset.bind){ setByPath(state, t.dataset.bind, t.value); persist(); renderPreview(); }
  if (t.dataset.toggleBind){ setByPath(state, t.dataset.toggleBind, t.checked); persist(); renderForm(); renderPreview(); }
});

// отслеживание активного rich-поля
scroll.addEventListener('focusin', e=>{
  if (e.target.dataset && e.target.dataset.rich){
    activeField = e.target;
    const h = document.getElementById('fmtHint'); h.textContent = 'выделите текст → формат'; h.style.color='';
  }
});

// клики по форме: аккордеон, add/remove/move, фото
scroll.addEventListener('click', e=>{
  const head = e.target.closest('[data-toggle]');
  if (head){
    const id = head.dataset.toggle;
    const accEl = head.closest('.acc');
    if (openSet.has(id)){ openSet.delete(id); accEl.classList.remove('open'); }
    else { openSet.add(id); accEl.classList.add('open'); }
    return;
  }
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act;

  if (act==='photo'){ document.getElementById('photoFile').click(); return; }
  if (act==='photo-clear'){ state.profile.photo = null; renderForm(); renderPreview(); persist(); reopenLast(); return; }

  const list = btn.dataset.list;
  if (act==='add'){ state[list].push(BLANK[list]()); }
  if (act==='remove'){ state[list].splice(+btn.dataset.idx, 1); }
  if (act==='move'){
    const i = +btn.dataset.idx, dir = +btn.dataset.dir, arr = state[list];
    const j = i + dir;
    if (j>=0 && j<arr.length){ [arr[i], arr[j]] = [arr[j], arr[i]]; }
  }
  renderForm(); renderPreview(); persist();
});

// загрузка фото (input создаётся заново при каждом renderForm)
scroll.addEventListener('change', e=>{
  if (e.target.id !== 'photoFile') return;
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { state.profile.photo = ev.target.result; renderForm(); renderPreview(); persist(); reopenLast(); };
  reader.readAsDataURL(file);
});
function reopenLast(){ /* профиль всегда открыт после действий с фото */ const a=document.querySelector('[data-acc="s-profile"]'); if(a) a.classList.add('open'); openSet.add('s-profile'); }

// панель форматирования
document.querySelector('.ed-fmt').addEventListener('mousedown', e=>{
  const b = e.target.closest('[data-fmt]'); if (!b) return;
  e.preventDefault();                 // не терять фокус/выделение в поле
  applyFormat(b.dataset.fmt);
});

// акцентные цвета
document.querySelector('.ed-controls').addEventListener('click', e=>{
  const sw = e.target.closest('[data-accent]'); if (!sw) return;
  state.settings.accent = sw.dataset.accent; applyAccent(sw.dataset.accent); persist();
});
document.getElementById('accentPick').addEventListener('input', e=>{
  state.settings.accent = e.target.value; applyAccent(e.target.value); persist();
});

// компактный режим
document.getElementById('compactToggle').addEventListener('change', e=>{
  state.settings.compact = e.target.checked; renderPreview(); persist();
});

// экспорт/импорт/сброс
document.getElementById('btnExport').addEventListener('click', exportJSON);
document.getElementById('btnPublish').addEventListener('click', publishToGitHub);
document.getElementById('btnImport').addEventListener('click', ()=> document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e=>{ if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });
document.getElementById('btnReset').addEventListener('click', resetAll);

// сохранять выбранную страницу при ctrl+P? — нет, печать как есть

/* ════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════ */
applyAccent(state.settings.accent || '#BF5A36');
document.getElementById('compactToggle').checked = !!state.settings.compact;
renderForm();
renderPreview();
</script>
</body>
</html>
