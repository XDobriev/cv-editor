<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хамзат Добриев — Резюме</title>
<meta name="description" content="Резюме Хамзата Добриева — Frontend Developer (React, TypeScript). Онлайн-версия с экспортом в PDF.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FCFAF7; --ink:#211C18; --ink2:#4A4039; --muted:#8C8076;
    --line:#E7DED5; --accent:#BF5A36; --accent-deep:#934026;
    --accent-line:rgba(191,90,54,.32); --accent-tint:rgba(191,90,54,.12);
    --bg:#E9E5DF;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }

  /* ── chrome ── */
  .site-chrome {
    position: sticky; top: 0; z-index: 100; background: var(--paper);
    border-bottom: 1px solid var(--line); padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; box-shadow: 0 2px 16px rgba(33,28,24,.09);
  }
  .chrome-left { display: flex; align-items: center; gap: 14px; }
  .chrome-logo { display: flex; align-items: center; gap: 9px; }
  .chrome-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .chrome-name { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; }
  .chrome-sep { width: 1px; height: 18px; background: var(--line); }
  .chrome-role { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
    padding: 3px 8px; border: 1px solid var(--line); border-radius: 3px; background: var(--bg);
    text-decoration: none; transition: color .15s, border-color .15s; }
  a.chrome-role:hover { color: var(--accent-deep); border-color: var(--accent-line); }
  .btn-download {
    display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff;
    border: none; border-radius: 7px; padding: 10px 20px; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(191,90,54,.32); letter-spacing: .01em;
  }
  .btn-download:hover { background: var(--accent-deep); box-shadow: 0 4px 14px rgba(191,90,54,.38); transform: translateY(-1px); }
  .btn-download:active { transform: translateY(0); box-shadow: 0 1px 4px rgba(191,90,54,.22); }

  .tip-bar { background: var(--accent-tint); border-bottom: 1px solid var(--accent-line);
    padding: 9px 28px; display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent-deep); line-height: 1.5; }
  .tip-bar strong { font-weight: 600; }

  .stage { display: flex; justify-content: center; padding: 44px 16px 72px; min-height: calc(100vh - 94px); }

  /* ── resume page (канонические стили из общего рендерера) ── */
  .rc-page { width: 794px; min-height: 1123px; background: var(--paper); color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif; padding: 44px 56px 48px; display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased; border-top: 4px solid var(--accent); box-shadow: 0 8px 48px rgba(60,30,15,.2); }
  .rc-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 26px; }
  .rc-headl { min-width: 0; }
  .rc-tagline { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--accent); letter-spacing: .02em; margin-bottom: 9px; }
  .rc-tagline .br { color: var(--muted); }
  .rc-name { font-size: 40px; font-weight: 600; line-height: 1.02; letter-spacing: -.02em; margin: 0; color: var(--ink); }
  .rc-sub { font-size: 13px; color: var(--ink2); margin-top: 7px; font-weight: 500; }
  .rc-photo { width: 100px; height: 100px; flex: 0 0 auto; border: 1px solid var(--line); object-fit: cover; }
  .rc-photo-ph { width: 100px; height: 100px; flex: 0 0 auto; border: 1px solid var(--line); background: var(--accent-tint);
    display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); }
  .rc-meta { display: flex; flex-wrap: wrap; gap: 4px 22px; margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink2); }
  .rc-meta .mk { color: var(--muted); }
  .rc-meta a { color: var(--ink2); text-decoration: none; border-bottom: 1px solid transparent; }
  .rc-meta a:hover { border-bottom-color: var(--accent-line); }
  .rc-divider { height: 1px; background: var(--line); margin: 18px 0; }
  .rc-cols { display: grid; grid-template-columns: 1fr 246px; gap: 38px; flex: 1; }
  .rc-col-empty { display: none; }
  .rc-sechead { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); font-weight: 600; margin: 0 0 13px; display: flex; align-items: center; gap: 8px; }
  .rc-sechead .idx { color: var(--accent); }
  .rc-block { margin-bottom: 16px; }
  .rc-block:last-child { margin-bottom: 0; }
  .rc-exp { margin-bottom: 10px; }
  .rc-exp:last-child { margin-bottom: 0; }
  .rc-exp-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .rc-org { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .rc-unit { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.3; margin-top: 1px; }
  .rc-period { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); white-space: nowrap; }
  .rc-title { font-size: 12px; color: var(--accent-deep); font-weight: 500; margin: 1px 0 7px; }
  .rc-bullets { list-style: none; padding: 0; margin: 0; }
  .rc-bullets li { font-size: 12px; line-height: 1.45; color: var(--ink2); padding-left: 18px; position: relative; margin-bottom: 4px; }
  .rc-bullets li::before { content: '→'; position: absolute; left: 0; top: 0; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .rc-bullets b { color: var(--ink); font-weight: 700; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; }
  .rc-proj { margin-bottom: 11px; }
  .rc-proj-top { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
  .rc-proj-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .rc-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: .02em; color: var(--accent); border: 1px solid var(--accent-line); border-radius: 2px; padding: 1.5px 6px; }
  .rc-stack { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin: 3px 0 4px; line-height: 1.45; }
  .rc-desc { font-size: 11.5px; line-height: 1.45; color: var(--ink2); margin: 0; }
  .rc-desc b { color: var(--ink); font-weight: 600; }
  .rc-links { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .rc-techgrp { margin-bottom: 13px; }
  .rc-tgh { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .04em; color: var(--accent-deep); margin-bottom: 6px; text-transform: lowercase; }
  .rc-tgh::before { content: '# '; color: var(--accent); }
  .rc-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .rc-chip { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--ink2); border: 1px solid var(--line); border-radius: 3px; padding: 2px 7px; line-height: 1.3; background: #fff; white-space: nowrap; }
  .rc-edu { margin-bottom: 11px; }
  .rc-edu:last-child { margin-bottom: 0; }
  .rc-edu-h { font-size: 12px; font-weight: 600; color: var(--ink); }
  .rc-edu-p { font-size: 11px; color: var(--ink2); line-height: 1.4; margin: 1px 0; }
  .rc-edu-d { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .rc-lang { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .rc-lang:last-child { border-bottom: 0; }
  .rc-lang .l { color: var(--ink); font-weight: 500; }
  .rc-lang .v { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .rc-page mark { background: var(--accent-tint); color: var(--accent-deep); padding: 0 3px; border-radius: 2px; font-weight: 500; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
  .rc-page i { font-style: italic; }
  .rc-desc a, .rc-bullets a, .rc-links a, .rc-edu-p a { color: var(--accent-deep); text-decoration: none; border-bottom: 1px solid var(--accent-line); font-weight: 500; }
  .rc-desc a:hover, .rc-bullets a:hover, .rc-links a:hover { border-bottom-color: var(--accent-deep); }

  /* compact density */
  .rc-page.compact { padding: 30px 46px 34px; }
  .rc-page.compact .rc-name { font-size: 33px; }
  .rc-page.compact .rc-meta { margin-top: 10px; }
  .rc-page.compact .rc-divider { margin: 12px 0; }
  .rc-page.compact .rc-cols { gap: 28px; }
  .rc-page.compact .rc-block { margin-bottom: 11px; }
  .rc-page.compact .rc-sechead { margin-bottom: 9px; }
  .rc-page.compact .rc-exp { margin-bottom: 8px; }
  .rc-page.compact .rc-bullets li { font-size: 11px; line-height: 1.38; margin-bottom: 3px; }
  .rc-page.compact .rc-desc { font-size: 11px; line-height: 1.4; }
  .rc-page.compact .rc-proj { margin-bottom: 8px; }
  .rc-page.compact .rc-techgrp { margin-bottom: 10px; }
  .rc-page.compact .rc-lang { padding: 4px 0; }

  /* print → настоящий A4 PDF */
  @media print {
    @page { size: A4; margin: 0; }
    html, body { background: #fff; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .site-chrome, .tip-bar { display: none !important; }
    .stage { padding: 0; margin: 0; min-height: auto; display: block; }
    .rc-page { box-shadow: none !important; width: 210mm; min-height: auto; margin: 0; }
    .rc-page * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="site-chrome">
  <div class="chrome-left">
    <div class="chrome-logo">
      <div class="chrome-dot"></div>
      <span class="chrome-name">Хамзат Добриев</span>
    </div>
    <div class="chrome-sep"></div>
    <a href="index.html" class="chrome-role">← Портфолио</a>
  </div>
  <button class="btn-download" onclick="window.print()">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
      <path d="M7.5 1.5v8m0 0L4.5 6.5m3 3l3-3" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 10.5v2a1 1 0 001 1h9a1 1 0 001-1v-2" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    Скачать PDF
  </button>
</div>

<div class="tip-bar">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
    <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/>
    <path d="M6.5 6v3.5m0-5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  </svg>
  Нажмите «Скачать PDF», затем выберите <strong>«Сохранить как PDF»</strong> — текст останется настоящим: его можно выделять и копировать.
</div>

<div class="stage">
  <div class="rc-page" id="resume"></div>
</div>

<script src="resume-data.js"></script>
<script src="resume-render.js"></script>
<script>
  // данные: дефолт из единого источника + личные правки из редактора (если есть)
  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
  let state = deepClone(window.RESUME_DATA);
  try {
    const raw = localStorage.getItem('resume-editor-state-v2');
    if (raw) state = Object.assign(deepClone(window.RESUME_DATA), JSON.parse(raw));
  } catch (e) {}

  // акцентный цвет (как в редакторе: из одного hex деривим оттенки)
  (function applyAccent(hex){
    if (!hex) return;
    const h2 = x => Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2,'0');
    const m = hex.replace('#',''); const r = parseInt(m.slice(0,2),16), g = parseInt(m.slice(2,4),16), b = parseInt(m.slice(4,6),16);
    if ([r,g,b].some(isNaN)) return;
    const root = document.documentElement.style;
    root.setProperty('--accent', hex);
    root.setProperty('--accent-deep', '#' + h2(r*0.78) + h2(g*0.78) + h2(b*0.78));
    root.setProperty('--accent-line', `rgba(${r},${g},${b},.32)`);
    root.setProperty('--accent-tint', `rgba(${r},${g},${b},.12)`);
  })(state.settings && state.settings.accent);

  const page = document.getElementById('resume');
  if (state.settings && state.settings.compact) page.classList.add('compact');
  page.innerHTML = renderResumeHTML(state);
  document.title = (state.profile && state.profile.name ? state.profile.name + ' — ' : '') + 'Резюме';
</script>
</body>
</html>
