<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хамзат Добриев — Frontend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FCFAF7;
    --ink: #211C18;
    --ink2: #4A4039;
    --muted: #8C8076;
    --line: #E7DED5;
    --accent: #BF5A36;
    --accent-deep: #934026;
    --accent-line: rgba(191,90,54,.32);
    --accent-tint: #F5E7DF;
    --bg: #E9E5DF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Site chrome ── */
  .site-chrome {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    box-shadow: 0 2px 16px rgba(33,28,24,.09);
  }

  .chrome-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .chrome-logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .chrome-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .chrome-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -.01em;
  }

  .chrome-sep {
    width: 1px;
    height: 18px;
    background: var(--line);
  }

  .chrome-role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--bg);
  }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 10px 20px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(191,90,54,.32);
    letter-spacing: .01em;
  }

  .btn-download:hover {
    background: var(--accent-deep);
    box-shadow: 0 4px 14px rgba(191,90,54,.38);
    transform: translateY(-1px);
  }

  .btn-download:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px rgba(191,90,54,.22);
  }

  /* ── Tip bar ── */
  .tip-bar {
    background: var(--accent-tint);
    border-bottom: 1px solid var(--accent-line);
    padding: 9px 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent-deep);
    line-height: 1.5;
  }

  .tip-bar strong {
    font-weight: 600;
  }

  /* ── Resume stage ── */
  .stage {
    display: flex;
    justify-content: center;
    padding: 44px 16px 72px;
    min-height: calc(100vh - 94px);
  }

  image-slot {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-tint);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .05em;
  }

  .rc-page { box-shadow: 0 8px 48px rgba(60,30,15,.2); }

  /* ── Resume component styles ── */
  .rc-page {
    width: 794px;
    height: 1123px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 44px 56px 48px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    border-top: 4px solid var(--accent);
  }
  .rc-mono { font-family: 'IBM Plex Mono', monospace; }
  .rc-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 26px; }
  .rc-headl { min-width: 0; }
  .rc-tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--accent);
    letter-spacing: .02em;
    margin-bottom: 9px;
  }
  .rc-tagline .br { color: var(--muted); }
  .rc-name { font-size: 40px; font-weight: 600; line-height: 1.02; letter-spacing: -.02em; margin: 0; color: var(--ink); }
  .rc-sub { font-size: 13px; color: var(--ink2); margin-top: 7px; font-weight: 500; }
  .rc-photo { width: 100px; height: 100px; flex: 0 0 auto; border: 1px solid var(--line); }
  .rc-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 22px;
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink2);
  }
  .rc-meta .mk { color: var(--muted); }
  .rc-meta a { color: var(--ink2); text-decoration: none; }
  .rc-divider { height: 1px; background: var(--line); margin: 18px 0; }
  .rc-cols { display: grid; grid-template-columns: 1fr 246px; gap: 38px; flex: 1; }
  .rc-sechead {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 600;
    margin: 0 0 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rc-sechead .idx { color: var(--accent); }
  .rc-block { margin-bottom: 16px; }
  .rc-block:last-child { margin-bottom: 0; }
  .rc-exp { margin-bottom: 10px; }
  .rc-exp:last-child { margin-bottom: 0; }
  .rc-exp-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .rc-org { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .rc-unit { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.3; margin-top: 1px; }
  .rc-period { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); white-space: nowrap; }
  .rc-title { font-size: 12px; color: var(--accent-deep); font-weight: 500; margin: 1px 0 7px; }
  .rc-bullets { list-style: none; margin: 0; padding: 0; }
  .rc-bullets li { font-size: 12px; line-height: 1.45; color: var(--ink2); padding-left: 18px; position: relative; margin-bottom: 4px; }
  .rc-bullets li:before { content: '→'; position: absolute; left: 0; top: 0; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .rc-bullets b { color: var(--ink); font-weight: 700; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; }
  .rc-proj { margin-bottom: 11px; }
  .rc-proj-top { display: flex; align-items: baseline; gap: 9px; }
  .rc-proj-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .rc-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .02em;
    color: var(--accent);
    border: 1px solid var(--accent-line);
    border-radius: 2px;
    padding: 1.5px 6px;
  }
  .rc-stack { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin: 3px 0 4px; line-height: 1.45; }
  .rc-desc { font-size: 11.5px; line-height: 1.45; color: var(--ink2); margin: 0; }
  .rc-links { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .rc-techgrp { margin-bottom: 13px; }
  .rc-tgh { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .04em; color: var(--accent-deep); margin-bottom: 6px; text-transform: lowercase; }
  .rc-tgh:before { content: '# '; color: var(--accent); }
  .rc-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .rc-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--ink2);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 2px 7px;
    line-height: 1.3;
    background: #fff;
    white-space: nowrap;
  }
  .rc-edu { margin-bottom: 11px; }
  .rc-edu-h { font-size: 12px; font-weight: 600; color: var(--ink); }
  .rc-edu-p { font-size: 11px; color: var(--ink2); line-height: 1.4; margin: 1px 0; }
  .rc-edu-d { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .rc-lang { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .rc-lang:last-child { border-bottom: 0; }
  .rc-lang .l { color: var(--ink); font-weight: 500; }
  .rc-lang .v { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── Print ── */
  @page { size: A4; margin: 0; }

  @media print {
    html, body { background: #fff; }
    .site-chrome,
    .tip-bar { display: none !important; }
    .stage { padding: 0; min-height: 0; }
    .rc-page { box-shadow: none !important; }
  }
</style>
</head>
