<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хамзат Добриев — резюме</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFAF7; --ink:#211C18; --ink2:#4A4039; --muted:#8C8076;
    --line:#E7DED5; --accent:#BF5A36; --accent-deep:#934026;
    --accent-line:rgba(191,90,54,.32); --accent-tint:#F5E7DF; --sidebar:#F4EAE1;
  }
  html,body{margin:0;padding:0;background:#e9e6e1;}
  .stage{display:flex;justify-content:center;padding:32px 16px;min-height:100vh;box-sizing:border-box;}
  image-slot{display:block;}
  .rc-page{box-shadow:0 8px 40px rgba(60,30,15,.16);}
  @page{size:A4;margin:0;}
  @media print{
    html,body{background:#fff;}
    .stage{padding:0;min-height:0;}
    .rc-page{box-shadow:none !important;}
  }
</style>
</head>
<body>
<div class="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</html>
